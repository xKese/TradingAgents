services:
  tradingagents:
    build: .
    env_file:
      - .env
    # Reach a local model server (LM Studio, vLLM, llama.cpp) running on the
    # host: use http://host.docker.internal:<port>/v1 as the backend URL. The
    # mapping below makes that name resolve on Linux too (already automatic on
    # Docker Desktop for Mac/Windows).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

  # Local web UI. Start with: docker compose --profile web up
  # then open http://localhost:8000 (override the host port via TRADINGAGENTS_WEB_PORT).
  tradingagents-web:
    build: .
    env_file:
      - .env
    command: ["serve", "--host", "0.0.0.0", "--port", "8000", "--no-browser"]
    ports:
      - "${TRADINGAGENTS_WEB_PORT:-8000}:8000"
    # Same host-gateway mapping so a browser run can target LM Studio / vLLM on
    # the host via http://host.docker.internal:<port>/v1.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    profiles:
      - web

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - TRADINGAGENTS_LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
