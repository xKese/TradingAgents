<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StrattonOak</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0b0e14; color: #e6e6e6;
      }
      main { max-width: 34rem; padding: 2rem; text-align: center; }
      h1 { font-size: 1.6rem; margin: 0 0 .25rem; letter-spacing: -0.01em; }
      .tag { color: #8b95a5; margin: 0 0 1.5rem; }
      code {
        background: #161b26; padding: .2rem .45rem; border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em;
      }
      a { color: #7aa2f7; }
      .pill {
        display: inline-block; padding: .2rem .6rem; border-radius: 999px;
        background: rgba(122,162,247,.15); color: #7aa2f7; font-size: .85rem;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="pill">StrattonOak Financials</span>
      <h1>Multi-Agent LLM Trading Framework</h1>
      <p class="tag">API surface deployed on Vercel.</p>
      <p>Health check: <a href="/api/health"><code>GET /api/health</code></a></p>
    </main>
  </body>
</html>
